# Local development and testing
# Usage: docker compose up --build
#
# Set required env vars in .env or export them:
#   OPENTIDE_ADMIN_SECRET=your-secret-here
#   ANTHROPIC_API_KEY=sk-ant-xxx
#   DISCORD_TOKEN=xxx (or SLACK_BOT_TOKEN)

services:
  opentide:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - OPENTIDE_ADMIN_SECRET=${OPENTIDE_ADMIN_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DO_GRADIENT_API_KEY=${DO_GRADIENT_API_KEY:-}
      - DISCORD_TOKEN=${DISCORD_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - DATABASE_URL=postgres://opentide:opentide@db:5432/opentide?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opentide
      POSTGRES_USER: opentide
      POSTGRES_PASSWORD: opentide
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opentide"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
