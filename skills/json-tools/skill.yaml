name: json-tools
version: 0.1.0
description: JSON manipulation - parse, format, query with dot notation, validate, minify
author: opentide
license: Apache-2.0

security:
  egress: []
  filesystem: read-only
  max_memory: 64Mi
  max_cpu: "0.25"
  timeout: 10s

triggers:
  tool_name: json_tools
  keywords:
    - json
    - parse json
    - format json
    - pretty print
    - validate json

runtime:
  image: opentide/skill-json-tools:0.1.0
  dockerfile: Dockerfile
  entrypoint: /skill
