name: text-tools
version: 0.1.0
description: Text manipulation utilities - word count, case conversion, find and replace, reverse, truncate
author: opentide
license: Apache-2.0

security:
  egress: []
  filesystem: read-only
  max_memory: 64Mi
  max_cpu: "0.25"
  timeout: 10s

triggers:
  tool_name: text_tools
  keywords:
    - text
    - count words
    - uppercase
    - lowercase
    - reverse text
    - replace

runtime:
  image: opentide/skill-text-tools:0.1.0
  dockerfile: Dockerfile
  entrypoint: /skill
