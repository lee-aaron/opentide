name: calculator
version: 0.1.0
description: Evaluate mathematical expressions safely in a sandbox
author: opentide
license: Apache-2.0

security:
  egress: []
  filesystem: read-only
  max_memory: 64Mi
  max_cpu: "0.25"
  timeout: 10s

triggers:
  tool_name: calculator
  keywords:
    - calculate
    - compute
    - math

runtime:
  image: opentide/skill-calculator:0.1.0
  dockerfile: Dockerfile
  entrypoint: /skill
