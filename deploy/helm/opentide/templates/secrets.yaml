{{- if or (not .Values.existingSecrets.providers) (not .Values.existingSecrets.admin) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "opentide.fullname" . }}-secrets
  labels:
    {{- include "opentide.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.admin.secret }}
  OPENTIDE_ADMIN_SECRET: {{ .Values.admin.secret | quote }}
  {{- end }}
  {{- if .Values.providers.anthropic.apiKey }}
  ANTHROPIC_API_KEY: {{ .Values.providers.anthropic.apiKey | quote }}
  {{- end }}
  {{- if .Values.providers.openai.apiKey }}
  OPENAI_API_KEY: {{ .Values.providers.openai.apiKey | quote }}
  {{- end }}
  {{- if .Values.providers.gradient.apiKey }}
  DO_GRADIENT_API_KEY: {{ .Values.providers.gradient.apiKey | quote }}
  {{- end }}
  {{- if .Values.adapters.discord.token }}
  DISCORD_TOKEN: {{ .Values.adapters.discord.token | quote }}
  {{- end }}
  {{- if .Values.adapters.slack.botToken }}
  SLACK_BOT_TOKEN: {{ .Values.adapters.slack.botToken | quote }}
  {{- end }}
  {{- if .Values.adapters.slack.appToken }}
  SLACK_APP_TOKEN: {{ .Values.adapters.slack.appToken | quote }}
  {{- end }}
{{- end }}
