apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opentide.fullname" . }}
  labels:
    {{- include "opentide.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "opentide.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "opentide.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.healthCheck.path }}
              port: http
            initialDelaySeconds: {{ .Values.healthCheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthCheck.path }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: OPENTIDE_DEMO
              value: "{{ .Values.gateway.demoMode }}"
            - name: OPENTIDE_DEV_MODE
              value: "{{ .Values.gateway.devMode }}"
            {{- if .Values.existingSecrets.providers }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.providers }}
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.providers }}
                  key: OPENAI_API_KEY
                  optional: true
            - name: DO_GRADIENT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.providers }}
                  key: DO_GRADIENT_API_KEY
                  optional: true
            {{- else }}
            {{- if .Values.providers.anthropic.apiKey }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "opentide.fullname" . }}-secrets
                  key: ANTHROPIC_API_KEY
            {{- end }}
            {{- if .Values.providers.openai.apiKey }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "opentide.fullname" . }}-secrets
                  key: OPENAI_API_KEY
            {{- end }}
            {{- if .Values.providers.gradient.apiKey }}
            - name: DO_GRADIENT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "opentide.fullname" . }}-secrets
                  key: DO_GRADIENT_API_KEY
            {{- end }}
            {{- end }}
            {{- if .Values.existingSecrets.adapters }}
            - name: DISCORD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.adapters }}
                  key: DISCORD_TOKEN
                  optional: true
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.adapters }}
                  key: SLACK_BOT_TOKEN
                  optional: true
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.adapters }}
                  key: SLACK_APP_TOKEN
                  optional: true
            {{- else }}
            {{- if .Values.adapters.discord.token }}
            - name: DISCORD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "opentide.fullname" . }}-secrets
                  key: DISCORD_TOKEN
            {{- end }}
            {{- if .Values.adapters.slack.botToken }}
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "opentide.fullname" . }}-secrets
                  key: SLACK_BOT_TOKEN
            {{- end }}
            {{- end }}
            {{- if .Values.postgresql.enabled }}
            - name: DATABASE_URL
              value: "postgres://{{ .Values.postgresql.auth.username }}:$(POSTGRES_PASSWORD)@{{ include "opentide.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}?sslmode=disable"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "opentide.fullname" . }}-postgresql
                  key: password
            {{- else if .Values.externalDatabase.url }}
            - name: DATABASE_URL
              value: {{ .Values.externalDatabase.url }}
            {{- end }}
