# DigitalOcean App Platform Specification
# Deploy: doctl apps create --spec deploy/app-platform/app.yaml
#
# Required environment variables (set in DO App Platform dashboard):
#   OPENTIDE_ADMIN_SECRET  - admin UI authentication secret
#   DISCORD_TOKEN or SLACK_BOT_TOKEN - messaging adapter
#
# LLM API keys can be set here or added via the admin UI after deploy.
# The code-runner skill is not available on App Platform (no Docker socket).

name: opentide

ingress:
  rules:
    - component:
        name: gateway
      match:
        path:
          prefix: /

services:
  - name: gateway
    github:
      repo: lee-aaron/opentide
      branch: main
      deploy_on_push: true
    dockerfile_path: deploy/docker/Dockerfile
    instance_count: 1
    instance_size_slug: professional-xs
    http_port: 8080
    health_check:
      http_path: /admin/health
      initial_delay_seconds: 10
      period_seconds: 30
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${opentide-db.DATABASE_URL}
      - key: OPENTIDE_ADMIN_SECRET
        scope: RUN_TIME
        type: SECRET
      # LLM providers (optional at deploy time, can be added via admin UI)
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: MODEL_ACCESS_KEY
        scope: RUN_TIME
        type: SECRET
      # Messaging adapters (at least one required)
      - key: DISCORD_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: SLACK_BOT_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: SLACK_APP_TOKEN
        scope: RUN_TIME
        type: SECRET
      # Skill configuration (optional)
      - key: GITHUB_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: BRAVE_API_KEY
        scope: RUN_TIME
        type: SECRET

databases:
  - name: opentide-db
    engine: PG
    version: "16"
    size: db-s-dev-database
    num_nodes: 1
